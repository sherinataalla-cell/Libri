dominant_attributes:
  tema_dominante: "il territorio del predatore — Rory nell'attico di Dante, dalla protezione alla prigionia della logica, primo cedimento fisico irrevocabile"
  registro_emotivo: "dark romance/thriller — tensione sessuale che esplode sotto alcol e paura, vulnerabilità a strati, il Cacciatore che sorveglia il crollo di entrambi"
  pov: "alternato (Rory → Dante)"

premise: >
  Subito dopo l'attacco del Cacciatore al Vesper (cap_03), Dante porta Rory nel suo attico privato
  — un luogo dove nessuno è mai entrato prima. Marco consegna Rory allo spazio del predatore e se
  ne va. Rory esplora: lusso controllato, arte che urla denaro, uno studio con più libri del
  previsto, una terrazza con vista totale su Seattle. Quando Dante arriva porta whiskey e una
  verità: non sei prigioniera, puoi andartene — ma dove? «Prigioniera della logica: te la
  costruisci da sola.»

problem: >
  Il countdown è a 42 ore (poi 41, 39, 37...). Sotto alcol e normalità surreale — Dante che cucina
  pasta, conversazione su libri e arte — si accumula la rivelazione: Dante conosce la storia di
  Rory dall'inizio, sa delle fonti sparite, delle minacce, del tracollo di due anni fa. Non è
  coincidenza. A notte inoltrata Rory non riesce a dormire, entra nello studio e trova i file del
  Cacciatore: Jessica Chen e Amber Morrison erano attiviste — anti-traffico, diritti delle donne —
  come Rory lo era prima che «la distruggessero». Il profilo del Cacciatore si cristallizza: non
  caccia vittime, caccia guerriere.

threshold_moment: >
  Il cedimento sulla scrivania di Dante — un bacio che è una battaglia, denti e disperazione,
  «questo è sbagliato» / «lo so» / nessuno si ferma. Vestiti che cadono, scrivania, freddo del
  legno contro la schiena, calore ovunque. Non è fare l'amore: è sopravvivenza, è bruciare vivi.
  Dopo — Rory al bagno, specchio, 37 ore — il Cacciatore chiama Dante sul personale: «Bella
  l'esca. Com'era?» Sa tutto, forse guardava. Poi la silhouette immobile sul tetto nord: dieci
  minuti a fissare l'attico, poi sparisce nelle ombre.

resolution_mode: >
  Alexei chiama con la scoperta che cambia l'intera geometria del pericolo: il Cacciatore non è
  iniziato sei mesi fa. È iniziato due anni fa — quando le fonti di Rory hanno cominciato a
  sparire, quando la sua carriera è stata distrutta. Aurora Winters non è una vittima casuale: è
  sempre stata il bersaglio finale. Il gioco è molto più grande di quanto pensassero, e Dante ha
  appena dato al bastardo la sua arma perfetta.

