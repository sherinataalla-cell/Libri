    focal_action: "Alexei chiama (quello vero). Corpo trovato — ragazza con profilo corrispondente. Aveva la tessera stampa vecchia di Rory, probabilmente sottratta dall'appartamento due anni fa. Messaggio del Cacciatore: 'Lei sa chi sono. Due anni fa l'ha quasi preso. Ora tocca a me prenderla.'"
    focal_object: null
    atmosphere: "escalation che chiude il cerchio — la prova fisica dello stalking biennale; il messaggio come rivendicazione di parità con Rory (che l'ha 'quasi preso' due anni fa)"
    palette: "telefono, luce sera"
    ambient_modifier: "'Due anni fa l'ha quasi preso' — mistero: quando? come? cosa ha fatto Rory senza saperlo?"
    onomatopee: []
    composition_zone: null
    notes: "DEBT aperto: identita_cacciatore_volkov (prossimo step), prossima_vittima_innocente_chi. Debt chiuso implicito: rory_bersaglio_da_2_anni (confermato con la tessera). Il messaggio suggerisce che Rory ha un'azione inconsapevole nel passato che ha quasi svelato il Cacciatore."
