    focal_action: "Dante annuncia la mossa: andare da Dimitri Volkov. Ora. Alexei e Rory reagiscono con incredulità. 'È l'unica mossa che non si aspetta.' Logica: se è lui, lo affronti; se non è lui, ti aiuta. Risposta a 'e se mi uccide?': 'Allora brucio la città. Tutta.' Non era metafora. E Aurora, Dio la aiutasse, gli credette."
    focal_object: null
    atmosphere: "decisione-bomba — la mossa più pericolosa come unica possibile; Dante che torna al predatore controllato dopo il crollo emotivo precedente; Rory che per la prima volta crede ciecamente"
    palette: "giacca, arma controllata, studio"
    ambient_modifier: "SEED piantato: incontro_dimitri_volkov — l'azione del prossimo capitolo è già in moto"
    onomatopee: []
    composition_zone: null
    notes: "Chiusura cap_05. 'Brucio la città. Tutta.' — frase-codice candidata per il registro di Dante. Il credere ciecamente di Rory come primo cedimento della sua resistenza verso il suo modo di operare."
    provenance: "original"
