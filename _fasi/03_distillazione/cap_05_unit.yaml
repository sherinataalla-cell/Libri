    atmosphere: "orrore silenzioso — Rory che sente ogni parola, Dante che le stringe la mano forte come ancoraggio; la voce distorta che li usa entrambi come pezzi"
    palette: "schermo del telefono, vivavoce, buio dello studio"
    ambient_modifier: "Dante le prende la mano — avvertimento + conforto simultanei"
    onomatopee: []
    composition_zone: null
    notes: "SEED piantato: prossima_vittima_innocente. Evoluzione M08 → M10: il Cacciatore ora usa il numero di Alexei (non solo quello di Dante). Come ha il numero di Alexei? Nuovo misalignment da segnalare."
    provenance: "original"

  - id: "cap_05_s13"
    position: 13
    type: "conflitto_interno"
    is_signature: false
    moment: "pomeriggio"
    location:
      id: "attico_dante"
      qualifier: "studio"
    characters_present:
      - "rory_winters"
      - "dante_ravencroft"
    focal_action: "Rory dichiara: si consegnerà se il Cacciatore minaccia un'altra. Dante rifiuta con una violenza verbale che non gli appartiene: 'Cazzo se lo è. Sei sotto la mia protezione.' Urla — lui che non urla mai. 'Pensi che sacrificarti salverà qualcuno? Lo farà solo vincere.' / 'Almeno—' / 'Almeno un cazzo.' La spinge contro il muro — gentile, fermo. 'Non. Ti. Lascio. Andare.'"
    focal_object: null
    atmosphere: "esplosione di controllo — Dante che urla è la vera rottura della maschera; la spinta contro il muro è gentile rispetto alla disperazione che la motiva; 'troppo vicini, come la notte prima ma con disperazione invece di desiderio — o forse erano sempre stati la stessa cosa'"
    palette: "muri dello studio, corpi troppo vicini"
    ambient_modifier: "'Desiderio' e 'disperazione' come gemelli — la frase che svela come Dante legge la notte precedente"
    onomatopee: []
    composition_zone: null
    notes: "Rottura strutturale: Dante urla per la prima volta nel testo. La nota 'Dante non urla mai' come definizione di identità crea l'impatto della scena. 'Non. Ti. Lascio. Andare.' — frase-codice candidata."
    provenance: "original"

  - id: "cap_05_s14"
    position: 14
    type: "intimita_disperazione"
