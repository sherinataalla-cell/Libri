premise: "La mattina dopo la notte sulla scrivania. Rory si sveglia nell'attico con un livido osceno al collo e trentuno ore nel pensiero. Dante ha già caffè pronto. Il Cacciatore era sul tetto a cinquanta metri. Alexei ha trovato un pattern: ogni volta che spariva una fonte di Rory, spariva anche una ragazza con profilo simile — due anni fa. Il Cacciatore caccia Rory dall'inizio. Poi qualcuno entra nell'appartamento di Rory, e tutto precipita."

problem: "L'appartamento di Rory è stato violato: centinaia di foto di lei scattate nel corso di due anni, scritte nel sangue ('LEI È MIA. SEMPRE STATA MIA. DA DUE ANNI ASPETTO'), e — al centro del letto — la foto intime della notte precedente. Il Cacciatore guardava. Poi arriva un album fotografico all'attico per corriere: documentazione alternata Rory-viva / ragazza-uccisa su due anni. Il Cacciatore chiama dal numero di Alexei: ventisette ore, poi verrà a prenderla. Vuole 'purificarla'. Rory vuole consegnarsi per salvare una vittima innocente. Dante rifiuta con un'intensità che rivela tutto."

threshold_moment: "Fronte alla fronte nell'attico, dopo che Dante l'ha spinta contro il muro per fermarla. 'Non chiedermi di lasciarti morire.' E poi, come se fosse la prima volta che lo diceva ad alta voce: 'Imparerai. Come ho fatto io.' Il momento in cui l'investimento emotivo di Dante cessa di essere neabile. E la connessione Volkov che arriva subito dopo — il Cacciatore come arma di Dimitri contro Dante — che trasforma il tutto in una guerra tra famiglie del crimine."

resolution_mode: "Dante decide di prendere l'iniziativa: andare direttamente da Dimitri Volkov. Mossa che nessuno si aspetta, potenzialmente suicida, unica che potrebbe cambiare le regole del gioco. Aurora, Dio la aiutasse, gli credette quando disse che avrebbe bruciato la città."

