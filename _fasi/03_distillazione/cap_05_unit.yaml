      qualifier: "studio"
    characters_present:
      - "rory_winters"
      - "dante_ravencroft"
    focal_action: "Fronte alla fronte. Dante chiude gli occhi. 'Non chiedermi di lasciarti morire.' Rory: 'Non posso vivere con altro sangue—' / 'Imparerai.' Apre gli occhi. 'Come ho fatto io.' Si scosta. Il momento rotto. La prima autobiografia di Dante come sopravvissuto — lui sa com'è vivere con il sangue degli altri nelle mani."
    focal_object: null
    atmosphere: "vulnerabilità assoluta — Dante che tocca la propria storia di violenza per dare a Rory un permesso di sopravvivenza; il momento più intimo del capitolo, più della notte precedente"
    palette: "fronte contro fronte, occhi chiusi, buio intorno"
    ambient_modifier: "'Come ho fatto io' — tre parole che rivelano più di qualsiasi confessione esplicita"
    onomatopee: []
    composition_zone: null
    notes: "SEED piantato: dante_non_ti_lascio_morire (promessa con radici autobiografiche). Prima rivelazione autobiografica di Dante: ha dovuto imparare a vivere con le morti sulle mani. Connette con il flashback del primo omicidio a 19 anni (s07)."
    provenance: "original"

