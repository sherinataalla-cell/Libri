    focal_action: "Alexei porta la connessione: il Cacciatore ha lavorato per la bratva della West Coast di Dimitri Volkov — pulizie, sparizioni. I Volkov pensano che Dante tenga Sofia prigioniera. Dimitri non ha approvato la 'soluzione' di Natasha. Teoria: Dimitri usa il Cacciatore per mandare un messaggio a Dante, colpendolo attraverso Rory. 'Esca e messaggio. Fantastico.' — ride senza gioia."
    focal_object: null
    atmosphere: "guerra tra famiglie criminali rivelata — la storia d'amore/thriller si allarga su scala bratva; Rory che capisce di essere pedina in una partita molto più grande"
    palette: "cartella di documenti, luce sera, studio"
    ambient_modifier: "Comunicazione silenziosa Dante-Alexei: sguardi che bastano, storia condivisa"
    onomatopee: []
    composition_zone: null
    notes: "SEED piantato: dimitri_volkov_connessione. Debut attivo: dimitri_volkov come entità narrativa (prima solo referito come padre di Sofia). Connette la storyline Cacciatore con la storyline Volkov — fusione delle due linee di conflitto."
