unit_id: cap_06

scenes:
  - id: cap_06_s01
    position: 1
    type: arrivo_territorio_nemico
    is_signature: false
    moment: giorno
    location:
      id: compound_volkov
      qualifier: checkpoint_ingresso
    characters_present:
      - rory_winters
      - dante_ravencroft
    focal_action: "SUV attraversa il primo checkpoint del compound Volkov. Dante detta regole di sopravvivenza. Rory conta le uscite. Secondo checkpoint: Dante consegna l'arma con riluttanza."
    focal_object: null
    atmosphere: "fortezza medievale trapiantata nelle colline — guardie armate, cani-lupo, telecamere. Potere e paranoia come architettura vivente."
    palette: "SUV scuro, checkpoints, guardie, telecamere"
    ambient_modifier: "countdown 22 ore"
    onomatopee: []
    composition_zone: null
    notes: "Seed che fiorisce: incontro_dimitri_volkov (piantato cap_05). Dante senza arma = vulnerabilità narrativa sottolineata."
    provenance: original

  - id: cap_06_s02
    position: 2
    type: incontro_potere
    is_signature: true
    moment: giorno
    location:
      id: compound_volkov
      qualifier: ufficio_dimitri
    characters_present:
      - rory_winters
      - dante_ravencroft
      - dimitri_volkov
      - natasha_volkov
      - mikhail_volkov
    focal_action: "Dimitri riceve Dante e Rory. Vodka come test di rispetto. Dante chiede del Cacciatore. Scontro familiare su Sofia. Dimitri conferma che il Cacciatore ha operato nel territorio Volkov senza permesso."
    focal_object: null
    atmosphere: "opulenza sfacciata (marmo, oro, quadri da museo). Trono moderno. Il nome non detto della madre Volkov riempie la stanza come veleno."
    palette: "scrivania enorme, vodka, vestito rosso di Natasha, caminetto"
    ambient_modifier: "tensione familiare Volkov come sottotesto costante"
    onomatopee: []
    composition_zone: null
    notes: "Seed maturo: incontro_con_dimitri (debt cap_05). Sofia promessa ai Kozlov a sei anni — info nuova. Mikhail: 'È sopravvissuta a te per 24 anni.'"
    provenance: original

  - id: cap_06_s03
    position: 3
    type: rivelazione_marcus
    is_signature: true
    moment: giorno
    location:
      id: compound_volkov
      qualifier: ufficio_dimitri
    characters_present:
      - rory_winters
      - dante_ravencroft
      - dimitri_volkov
    focal_action: "Dimitri chiede se Rory sa del ragazzo — Marcus. Rivela: saltato dalla finestra cinque anni fa. Dante spiega senza scuse: Marcus vendette informazioni, tre uomini di Dante morirono. Dante lo smantellò pezzo per pezzo. 'Non l'ho toccato. Ma sì. L'ho spinto.'"
    focal_object: null
    atmosphere: "coltelli verbali precisi. Rory perde l'asse. Dante con voce morta che dice la verità."
    palette: "bicchieri di vodka, silenzio, pietra in faccia a Dante"
    ambient_modifier: "la stanza gira — vodka o verità"
    onomatopee: []
    composition_zone: null
    notes: "Rivelazione centrale del capitolo. Dante: 'Occhio per occhio. Sangue per sangue.' Frase codice: 'Non l'ho toccato. Ma sì. L'ho spinto.' Seed che fiorisce: identita_cacciatore_volkov (debt cap_05)."
    provenance: original

  - id: cap_06_s04
    position: 4
    type: rivelazione_identita_cacciatore
    is_signature: true
    moment: giorno
    location:
      id: compound_volkov
      qualifier: ufficio_dimitri
    characters_present:
      - rory_winters
      - dante_ravencroft
      - dimitri_volkov
      - natasha_volkov
      - mikhail_volkov
    focal_action: "Dimitri apre la cassaforte (impronta + codice + scanner retinico). Foto e fascicolo: Adrian Bell. Rory lo riconosce — era la sua fonte 'Alex qualcosa' due anni fa. Rivelazione: Adrian Belkov, mentore/amante di Marcus. Quando Dante distrugge Marcus, Adrian giura vendetta artistica — due anni di studio su Rory."
    focal_object: fascicolo_adrian_bell
    atmosphere: "horror della comprensione — il passato di Rory prende forma in una foto. Adrian non voleva ucciderla: voleva studiarla per darle a Dante come Dante ha dato Marcus."
    palette: "cassaforte nel muro, foto di Adrian, fascicolo"
    ambient_modifier: "Dimitri consegna il fascicolo per offesa ai Volkov, non per aiutare Dante"
    onomatopee: []
    composition_zone: null
    notes: "Debt chiuso: identita_cacciatore_volkov. Seed fiorito: dimitri_volkov_connessione (cap_05). Rory riconosce 'Alex' = Adrian Bell. Motivazione di Adrian: non uccidere Rory ma prenderla come Dante ha preso Marcus."
    provenance: original

  - id: cap_06_s05
    position: 5
    type: congedo_patto
    is_signature: false
    moment: "giorno→pomeriggio"
    location:
      id: compound_volkov
      qualifier: soglia_ufficio
    characters_present:
      - dante_ravencroft
      - dimitri_volkov
    focal_action: "Sulla soglia, Dimitri ferma Dante: 'Marcus era anche figlio mio. Non di sangue. Ma di scelta.' Richiede che il Cacciatore muoia urlando. Dante dà la sua parola."
    focal_object: null
    atmosphere: "peso del mandato. Patto verbale tra pari in un mondo senza legge."
    palette: "soglia, luce del corridoio"
    ambient_modifier: null
    onomatopee: []
    composition_zone: null
    notes: "Seed piantato: marcus_figlio_per_scelta_dimitri. Patto verbale come vincolo narrativo futuro."
    provenance: original

  - id: cap_06_s06
    position: 6
    type: aftermath_rivelazione
    is_signature: false
    moment: pomeriggio
    location:
      id: attico_dante
      qualifier: "ascensore→corridoio"
    characters_present:
      - rory_winters
      - dante_ravencroft
    focal_action: "SUV di ritorno, silenzio denso. Rory non fugge dalla verità: 'Siamo tutti mostri nel tuo mondo. Alcuni lo nascondono meglio.' Dante: 'Tu non sei un mostro.' All'attico, Dante la ferma: prime scuse. 'Mi dispiace. Per Marcus. Per non avertelo detto. Per tutto.' Doppia domanda: 'Lo rifaresti?' Sì. 'E con me?' 'Sì. Dio mi perdoni. Sì.'"
    focal_object: null
    atmosphere: "silenzio che urla. Aria di libertà dopo il compound. La verità come aria rarefatta."
    palette: "SUV, cielo di Seattle, ascensore"
    ambient_modifier: "22 ore → 21 ore"
    onomatopee: []
    composition_zone: null
    notes: "Seed piantato: dante_si_scusa_prima_volta. Prima scusa di Dante nella saga. Frase codice: 'Sì. Dio mi perdoni. Sì.'"
    provenance: original

  - id: cap_06_s07
    position: 7
    type: confronto_studio
    is_signature: true
    moment: sera
    location:
      id: attico_dante
      qualifier: studio
    characters_present:
      - rory_winters
      - dante_ravencroft
    focal_action: "Dante studia il fascicolo Adrian. Rory entra in silenzio. Guardano insieme foto di Adrian e Marcus giovani. Rory tenta un bacio di rabbia/disperazione. Dante la respinge: 'Non per le ragioni sbagliate.' Rory: 'E quali sarebbero quelle giuste?' Dante: non risponde. Rory se ne va. Dante: 'Fallito a meritarti.'"
    focal_object: fascicolo_adrian_bell
    atmosphere: "profumo di pioggia e rimorsi. Intimità impossibile. Il fascicolo come terzo personaggio."
    palette: "studio, fascicolo, foto Adrian/Marcus giovani, luce bassa"
    ambient_modifier: "21 ore"
    onomatopee: []
    composition_zone: null
    notes: "Seed piantato: dante_rifiuta_bacio_ragioni_sbagliate. Frase codice Dante: 'Fallito a meritarti' — mai detto prima. Inversione del pattern: è Rory che inizia, Dante che rifiuta."
    provenance: original

  - id: cap_06_s08
    position: 8
    type: avvistamento_nemico
    is_signature: false
    moment: sera
    location:
      id: the_vesper
      qualifier: sala_controllo
    characters_present:
      - rory_winters
      - dante_ravencroft
      - alexei
    focal_action: "Alexei: telecamere hanno ripreso figura corrispondente ad Adrian tre isolati dal Vesper, 20 minuti prima. Rory identifica l'andatura: 'È lui.' Adrian fa ricognizione. Dante ordina di raddoppiare la sicurezza."
    focal_object: null
    atmosphere: "sala controllo come cervello del Vesper. Schermi. Tensione tagliente."
    palette: "schermi sorveglianza, figura sfocata col cappuccio"
    ambient_modifier: "19 ore"
    onomatopee: []
    composition_zone: null
    notes: "Rory armata — quando ha preso la pistola? Debt aperto: rory_armata_quando. Seed che fiorisce: cacciatore_ha_accesso_attico (blooming da cap_04-05)."
    provenance: original

  - id: cap_06_s09
    position: 9
    type: chiamata_antagonista
    is_signature: true
    moment: sera
    location:
      id: the_vesper
      qualifier: sala_controllo
    characters_present:
      - rory_winters
      - dante_ravencroft
      - alexei
    focal_action: "Telefono di Rory squilla — numero sconosciuto. Speaker on. Adrian Bell chiama direttamente, voce non distorta per la prima volta. Riconosce che Rory ha parlato con Dimitri. Scontro Dante/Adrian. Adrian: 'non per ucciderti, per prenderti.' 'Aurora è speciale. Come Marcus era speciale.' Linea morta."
    focal_object: null
    atmosphere: "odio distillato nella voce. La voce di Adrian finalmente reale. Il collezionista di anime gemelle si rivela."
    palette: "telefono, sala controllo, silenzio dopo il click"
    ambient_modifier: "19 ore"
    onomatopee: []
    composition_zone: null
    notes: "Seed piantato: adrian_chiama_direttamente. Prima voce diretta di Adrian. Psicologia svelata: vuole spezzare Rory come Dante ha spezzato Marcus."
    provenance: original

  - id: cap_06_s10
    position: 10
    type: inversione_tattica
    is_signature: true
    moment: sera
    location:
      id: the_vesper
      qualifier: sala_controllo
    characters_present:
      - rory_winters
      - dante_ravencroft
    focal_action: "Rory: Adrian andrà all'attico, dove tutto è iniziato con Marcus. Dante nega la corsa agli errori. Poi il sorriso che terrorizza: 'Facendo l'unica cosa che non si aspetta. Invitiamolo.' 18 ore rimanenti."
    focal_object: null
    atmosphere: "inversione. Da difesa a offesa. La guerriera stanca riconosce il cambio di paradigma."
    palette: "sala controllo, schermi, il sorriso di Dante"
    ambient_modifier: "18 ore"
    onomatopee: []
    composition_zone: null
    notes: "Seed piantato: trappola_per_adrian. Da difesa a offesa. Setup per cap_07."
    provenance: original
