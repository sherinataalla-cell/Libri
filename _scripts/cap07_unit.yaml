dominant_attributes:
  tema_dominante: "il cacciatore che insegna alla preda a diventare cacciatrice — backstory reciproca svelata (sorveglianza Adrian su Rory / Marcus+Mina), primo bacio come punto di non ritorno, la trappola si attiva con la risposta 'Con piacere'"
  registro_emotivo: "dark romance/thriller — confessione/trauma condiviso, bacio disperato e reciproco ('dieci secondi'), training trasformativo (sopravvissuta → cacciatrice), countdown 18→6 ore"
  pov: "alternato (Rory → Dante)"

premise: "Rory e Dante nel safe house (quartiere industriale Seattle), 18 ore rimanenti prima della mossa di Adrian. Dante insegna a Rory come sopravvivere ad Adrian mentre entrambi abbattono le difese reciproche — confessano le loro storie, le paure, i segreti mai detti."

problem: "Per costruire un piano contro Adrian, Rory e Dante devono capire perché Adrian l'ha scelta due anni fa. Questo richiede svelamento reciproco: Rory racconta la sorveglianza di Adrian (fonte 'Alex', 6 mesi di foto, la mostra nell'appartamento con la foto di Marcus morto, il biglietto-manifesto). Dante rivela Marcus+Mina (il tradimento, la tortura psicologica, l'adozione mancata). La tensione raggiunge il punto di rottura: il primo bacio. Quando l'invito viene consegnato ad Adrian, la risposta è 'Con piacere' più una foto recente della terrazza dell'attico: Adrian era già lì."

threshold_moment: "Il bacio nel safe house: 'Non fu dolce. Non fu tenero. Fu disperato e affamato e pieno di una verità che nessuno dei due poteva dire ad alta voce.' Dieci secondi, fronte contro fronte. 'Questo è un errore. Lo so. Adrian lo userà contro di noi. Lo so. Per i prossimi dieci secondi, possiamo fingere di essere solo due persone che non sono rotte oltre ogni riparazione?'"

resolution_mode: "L'invito ad Adrian viene consegnato (carta color crema, inchiostro rosso sangue — Alexei) e lui risponde. Dante trasforma Rory da sopravvissuta a cacciatrice nelle 6 ore rimaste. Prima e seconda lezione enunciate. La terza lezione resta sospesa: 'a volte per vincere devi lasciare che la preda pensi di averti catturato.' Fine: 'È ora di invitare il diavolo a cena.' / 'Assicuriamoci che si strozzi col dessert.'"

