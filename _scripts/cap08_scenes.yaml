unit_id: cap_08

scenes:
  - id: cap_08_s01
    position: 1
    type: apertura_territorio_vuoto
    is_signature: false
    moment: "notte fonda (3:00 AM)"
    location:
      id: the_vesper
      qualifier: "piano principale — bar"
    characters_present:
      - dante_ravencroft
      - rory_winters
    focal_action: "Dante e Rory al Vesper vuoto alle tre del mattino. Marco ha evacuato il personale (ufficialmente perdita di gas). Dante fermo davanti al bar principale: il serpente nero nel legno lo 'fissa con accusa'. Rory tocca il bancone, traccia il serpente. 'È qui.' → Dante certo: 'È troppo poetico. Il cerchio che si chiude dove tutto è iniziato.' Piano: controllare ogni via d'uscita. Adrian conosce il posto quanto Dante — 'Marcus lo portava qui spesso.'"
    focal_object: null
    atmosphere: "Il Vesper come 'animale diverso' senza la folla — guscio vuoto, teatro dopo lo spettacolo, luci crude che rivelano macchie sul velluto e crepe nel trucco. Silenzio oppressivo. Passi che echeggiano. Rory più piccola senza tacchi, 'più giovane senza il trucco da guerra' ma occhi 'affilati come lame'."
    palette: "locale vuoto, bar in legno scuro, serpente inciso, luci di emergenza, Glock nella cintura di Rory"
    ambient_modifier: "countdown implicito — 20 ore all'orario dell'invito, ma Adrian è già in movimento"
    onomatopee: []
    composition_zone: null
    notes: "POV Dante. Apertura: il Vesper come territorio di Dante e come luogo dei fantasmi (Marcus). Prima menzione esplicita del nome Marcus in questo capitolo. Rory con la Glock del safe house — callback a cap_07 training. Seed che fiorisce: foto_attico_recente (la terrazza del Vesper è reale, Adrian ci era stato)."
    provenance: original

  - id: cap_08_s02
    position: 2
    type: rivelazione_marcus_luminoso
    is_signature: false
    moment: "notte fonda"
    location:
      id: the_vesper
      qualifier: "2° piano — suite VIP"
    characters_present:
      - dante_ravencroft
      - rory_winters
    focal_action: "Salita ai piani superiori. Dante rivela Marcus: 'Brillante. Marcus era... luminoso. Entrava in una stanza e tutti si voltavano.' Rory: 'Il tuo opposto.' Dante: 'In tutto. Io ero l'ombra, lui la luce. Io costruivo imperi nel fango, lui dipingeva cieli.' Suite VIP (odore di sesso stantio e cocaina). Marcus collezionava persone rotte: 'Le riparava quanto bastava per essere funzionali, ma mai abbastanza da non aver più bisogno di lui.' Adrian come 'capolavoro incompiuto': tirato fuori dalla droga, ricadeva; trovato lavoro, spariva."
    focal_object: null
    atmosphere: "Suite VIP abbandonata, odori stantii di vizi altrui — passato di lusso decadente. Il nome di Marcus 'aleggia come un fantasma'. Dante parla del passato con una precisione chirurgica che nasconde il dolore."
    palette: "suite oscura, finestre su Seattle notturna, velluto consumato, luce rade"
    ambient_modifier: null
    onomatopee: []
    composition_zone: null
    notes: "POV Dante. Approfondimento del ritratto di Marcus (già in cap_07_s09 ma da angolazione diversa: qui la descrizione è più tenerezza-possesso-cecità rispetto alla testimonianza di tradimento). Dante: 'Pensavo che insieme fossimo bilanciati.' — cecità volontaria. Marcus come 'progetto di salvataggio incompiuto' per Adrian, parallelo con Mina. Seed maturing: da_sopravvissuta_a_cacciatrice (Rory interroga con la stessa acuità tattica che Dante le ha insegnato)."
    provenance: original

  - id: cap_08_s03
    position: 3
    type: ammissione_specchio_morale
    is_signature: true
    moment: "notte fonda"
    location:
      id: ufficio_rory
      qualifier: "3° piano — ufficio all'interno del Vesper"
    characters_present:
      - dante_ravencroft
      - rory_winters
    focal_action: "Ufficio di Rory — 'come l'aveva lasciato giorni prima, quando tutto questo era iniziato'. Cartella con le foto delle ragazze: Jessica Chen, Amber Morrison. Dante sul metodo di Adrian: 'Non uccide. Non direttamente. [...] Crea le condizioni per la caduta, poi lascia che la gravità faccia il resto. Così può dire a se stesso che non è un assassino. Che sono loro a scegliere.' Rory: 'Come hai fatto tu con Marcus.' Dante si irrigidisce ma non nega: 'Sì. Come ho fatto io. È per questo che Adrian mi odia così tanto. Non solo per aver causato la morte di Marcus, ma per avergli mostrato che siamo uguali.' Rory: 'C'è una differenza. Tu lo sai. Tu riconosci quello che sei. Adrian si racconta ancora che è la vittima.' Messaggio Alexei: furgone nero, due isolati a est."
    focal_object: fascicolo_adrian_bell
    atmosphere: "Ritorno al punto di partenza del romanzo (ufficio dove Rory aveva iniziato l'inchiesta) — circolarità narrativa. La cartella con i volti delle ragazze scomparse come peso morale tangibile. Il momento di ammissione di Dante come bomba verbale deflagrata in silenzio."
    palette: "ufficio al terzo piano, scrivania con cartella-foto, luci di emergenza, volti delle ragazze"
    ambient_modifier: "furgone nero in avvicinamento — la minaccia si materializza"
    onomatopee: []
    composition_zone: null
    notes: "POV Dante → transizione Rory. Momento-chiave del capitolo: Dante ammette 'Sì. Come ho fatto io.' — prima ammissione esplicita dell'equivalenza morale con Adrian. Seed piantato: metodo_specchio_ammesso. Callback: jessica_chen_scomparsa, amber_morrison_scomparsa (le ragazze nella cartella). Messaggio Alexei attiva il countdown concreto. Rory: 'Ma tu lo sai' — la differenza che conta per lei."
    provenance: original

  - id: cap_08_s04
    position: 4
    type: confessione_terrazza_morte_marcus
    is_signature: true
    moment: "notte fonda (prima dell'alba)"
    location:
      id: the_vesper
      qualifier: "terrazza — ultimo piano (42° piano)"
    characters_present:
      - dante_ravencroft
      - rory_winters
    focal_action: "Ultimo piano, terrazza. 'L'aria fredda della notte li investì, portando con sé l'odore di pioggia e cemento bagnato.' Dante indica il punto preciso: 'È qui che è successo. Proprio qui.' Marcus piangeva. Dante era 'paralizzato'. 'Ha scavalcato la ringhiera come se fosse la cosa più naturale del mondo. Si è voltato verso di me, ha detto Perdonami e si è lasciato andare all'indietro. Come tuffarsi in una piscina. Solo che non c'era acqua ad aspettarlo.' Rory: 'Non è stata colpa tua.' Dante elenca quello che ha fatto (tre settimane di tortura psicologica, funerali, bambina orfana). Rory: 'Gli hai mostrato la verità. Una verità che non poteva sopportare. Ma la verità era sua, non tua.' Adrian non la vede così. Rory: 'Siamo tutti più complessi.' Messaggio Marco: 'È dentro. Piano terra. Solo.'"
    focal_object: null
    atmosphere: "La terrazza come luogo di morte e ora di confessione. Ringhiera di vetro e acciaio che arriva al petto — 42 piani di vuoto. Seattle illuminata sotto la pioggia. Rory vicina a Dante senza toccarlo, 'abbastanza vicina da sentire il suo calore'. Il suicidio di Marcus raccontato per la prima volta in prima persona da Dante."
    palette: "terrazza notturna, ringhiera di vetro/acciaio, Seattle illuminata, pioggia, cemento bagnato, 42 piani di vuoto"
    ambient_modifier: "messaggio Marco: Adrian è già dentro — 20 ore diventano 0"
    onomatopee: []
    composition_zone: null
    notes: "POV Dante. Seed piantato: marcus_morte_narrazione_diretta (prima volta che Dante racconta la morte di Marcus in prima persona completa, con dettagli fisici: come si è voltato, cosa ha detto, come si è lasciato andare). NOTA: in cap_08 la terrazza è inequivocabilmente quella del Vesper building (non l'attico privato di Dante) — chiarisce parzialmente M16: 'attico' in cap_07_s04 era probabilmente riferimento impreciso al piano alto del Vesper. Seed maturing: foto_attico_recente (questa è la terrazza della foto di Adrian). Rory: 'Non sono Marcus. Non salterò. E non lascerò che mi spinga.' — anticipa il confronto con Adrian."
    provenance: original

  - id: cap_08_s05
    position: 5
    type: confronto_adrian
    is_signature: true
    moment: "notte fonda (3:30 AM)"
    location:
      id: ufficio_dante
      qualifier: "ufficio — piano alto"
    characters_present:
      - dante_ravencroft
      - rory_winters
      - il_cacciatore
    focal_action: "Posizionamento tattico. Adrian entra 'come ospite atteso a una cena elegante' — alto, magro, capelli biondi lunghi, completo nero largo (forse di Marcus). Voce morbida come sempre. 'Grazie per l'invito.' Adrian cammina con grazia da ballerino/predatore. Sul metodo: 'Ho fotografato ogni ragazza nel momento in cui capivano che nessuno le avrebbe salvate. È trascendente.' Estrae la macchina fotografica (non un'arma). Rory: 'Sei malato.' Adrian: 'Sono un artista.' Fotografa Rory. 'Due anni di preparazione. Conosco ogni tua espressione.' Rivela i segreti di Rory: infertilità (endometriosi, ventitré anni), padre morto da impalcatura a dodici anni, paura dell'acqua (sorella quasi annegata). Il colpo di Rory: sfiora la guancia di Adrian, lascia una linea rossa. Adrian tocca il sangue sulle dita: 'Perfetto. Assolutamente perfetto.'"
    focal_object: macchina_fotografica_adrian
    atmosphere: "Il confronto come teatro — Adrian che si muove lateralmente mantenendo entrambi nel suo campo visivo, la macchina fotografica come arma psicologica, il flash come detonatore. Adrian vestito (forse) con il completo di Marcus: profanazione silenziosa. Dante che tiene la pistola abbassata ma visibile — controllo attraverso la visibilità della minaccia. Rory 'uscita da dietro la scrivania' — rifiuto della protezione passiva."
    palette: "ufficio semi-buio, pistola abbassata, macchina fotografica, flash improvviso, guancia di Adrian che sanguina"
    ambient_modifier: "3:30 AM — Adrian è arrivato 20 ore in anticipo"
    onomatopee: []
    composition_zone: null
    notes: "POV Dante → Rory. Seeds che fioriscono: rory_non_puo_avere_figli (Adrian la usa come arma pubblica), backstory_sorveglianza_adrian_rory (Adrian conferma i 2 anni di studio con dettagli medici e biografici precisi). OGGETTO NUOVO: macchina_fotografica_adrian (da promuovere). Debt parzialmente indirizzato: rory_infertilita_come_sa_adrian (Adrian lo sa tramite 2 anni di sorveglianza capillare, accesso a cartelle mediche implicito — ma meccanismo specifico non dichiarato, debt resta aperto). Rory spara — azione da cacciatrice: callback da_sopravvissuta_a_cacciatrice. La risposta di Adrian ('Perfetto') suggerisce che il colpo faceva parte del suo piano/desiderio artistico. Note: Adrian porta completo 'prestato da qualcuno più robusto — forse da Marcus' → nuovo dettaglio su Adrian che ha/aveva oggetti di Marcus."
    provenance: original

  - id: cap_08_s06
    position: 6
    type: sparatoria_fuga_passaggio_segreto
    is_signature: false
    moment: "notte fonda"
    location:
      id: ufficio_dante
      qualifier: "ufficio — piano alto"
    characters_present:
      - dante_ravencroft
      - rory_winters
      - il_cacciatore
    focal_action: "Il vetro della finestra esplode: 4-5 figure in nero si calano dal tetto con corde. Granata fumogena. Dante spara al primo intruso, si tuffa verso Rory. La spinge dietro la scrivania di mogano. Fumo acre che riempie la stanza. Dante: 'Vogliono prenderci vivi — altrimenti avrebbero usato granate vere. Adrian vuole il suo grand finale sulla terrazza.' Dante copre la ritirata. Rory trova la leva nascosta dietro la libreria: porta segreta. Rory lascia la copertura per sparare all'uomo che blocca Dante — lo colpisce alla spalla. Dante si muove ma viene colpito al fianco (proiettile passante — 'bruciava come l'inferno'). Si infilano nel passaggio segreto."
    focal_object: null
    atmosphere: "Ufficio che diventa campo di battaglia — lampade polverizzate, schegge di vetro come grandine. Fumo denso e acre. Professionisti (probabilmente ex-militari) in formazione tattica. Adrian scompare nel caos — si rifugia per fotografare. Il passaggio segreto come via di fuga architettonica preesistente."
    palette: "vetro esploso, fumo bianco acre, sagome in nero, muzzle flash, sangue sul fianco di Dante"
    ambient_modifier: "granata fumogena — riduzione visibilità"
    onomatopee: []
    composition_zone: null
    notes: "Action scene. Rory agisce come cacciatrice — seed da_sopravvissuta_a_cacciatrice in piena azione: non fugge ma torna indietro per Dante. Seed piantato: squadra_mercenari_adrian (ex-militari professionisti, probabilmente 4-5 uomini). Seed piantato: dante_ferita_vesper (proiettile al fianco destro, ferita passante, sanguina abbondantemente). Adrian nel caos 'probabilmente rifugiato per fotografare' — il suo ruolo è di osservatore/documentarista anche in azione."
    provenance: original

  - id: cap_08_s07
    position: 7
    type: cura_ferita_secondo_bacio
    is_signature: true
    moment: "notte fonda"
    location:
      id: the_vesper
      qualifier: "10° piano — magazzino"
    characters_present:
      - dante_ravencroft
      - rory_winters
    focal_action: "Fuga nella scala di servizio. Al 10° piano: Rory ferma Dante (pallore, sangue che gocciola). Magazzino. Rory esamina la ferita: proiettile entrato dal fianco, uscito dalla parte posteriore — ferita pulita ma sanguina molto. Strappa strisce dalla sua maglietta, preme il tessuto sulla ferita. Dante: 'Perché sei tornata? Avresti potuto scappare.' Rory: 'Pensi davvero che ti avrei lasciato lì?' Dante: 'Sarebbe stata la cosa intelligente.' Rory: 'Fuck la cosa intelligente. Non ti lascio morire per i peccati di Adrian. O di Marcus. O di chiunque altro.' Dante la bacia: 'Non il bacio disperato del safe house. Questo era diverso. Più profondo. Come se stesse versando ogni verità non detta in quel contatto.' Rory: lacrime negli occhi che si rifiuta di far cadere. 'Non morire su di me.' Dante: 'Non ne ho intenzione.'"
    focal_object: null
    atmosphere: "Magazzino semi-buio, luce fioca — controtempo di intimità forzata nell'emergenza. Le mani di Rory sul corpo di Dante come atto di cura e rivendicazione. La benda improvvisata dalla maglietta come gesto simbolico (si spoglia di sé per proteggerlo). Il secondo bacio come sgambetto alla morte."
    palette: "magazzino scuro, camicia di Dante macchiata, tessuto strappato, luce fioca, sangue caldo"
    ambient_modifier: "ferita attiva — countdown biologico aggiunto al countdown narrativo"
    onomatopee: []
    composition_zone: null
    notes: "POV Rory. Seed piantato: secondo_bacio_vesper. Seed maturing: bacio_safe_house (il secondo bacio è più profondo — la relazione si consolida sotto la minaccia di morte). Debt piantato: dante_ferita_gravita (ferita passante al fianco — Rory ha tamponato ma Dante continua a perdere sangue). Rory: 'Siamo due sopravvissuti che hanno deciso di sopravvivere insieme.' — enunciato esplicito del contratto emotivo della coppia. Frase di Rory: 'Non ti lascio morire per i peccati di Adrian. O di Marcus. O di chiunque altro.' — rifiuto del sacrificio senza scopo."
    provenance: original

  - id: cap_08_s08
    position: 8
    type: voce_antagonista_interfono
    is_signature: true
    moment: "notte fonda"
    location:
      id: the_vesper
      qualifier: "corridoi — piani medi"
    characters_present:
      - dante_ravencroft
      - rory_winters
      - il_cacciatore
    focal_action: "L'allarme antincendio suona — distorto, modulato. Sotto di esso: la voce di Adrian all'interfono del Vesper. 'So che mi sentite. So che state correndo. Nascondendovi. Sanguinando. Marcus sanguinava anche lui, alla fine.' Rivela che Marcus si tagliava ('piccoli tagli sulle bracce — il dolore fisico lo distraeva da quello emotivo'). 'Ho le foto. Ogni taglio documentato. Serie artistica: La Decomposizione di un Angelo.' Dante si irrigidisce — non lo sapeva, Marcus glielo aveva nascosto. Adrian annuncia l'opera corrente: 'La Caduta della Verità. Con la bellissima Rory Winters nel ruolo principale. E Dante Ravencroft come se stesso. Il mostro.' Il sistema antincendio si attiva con liquido chimico dall'odore strano: 'Non è tossico. Solo un po' allucinogeno. Rende tutto più artistico.'"
    focal_object: null
    atmosphere: "Amplificazione dell'intimità violata — Adrian nella voce mentre la stanza si riempie di liquido. La rivelazione su Marcus (automutilazione) come arma finale contro Dante: l'unica verità che non sapeva. Il liquido allucinogeno come perversione poetica del sistema di sicurezza."
    palette: "corridoi con allarme lampeggiante, liquido che piove dai soffitti, voce di Adrian nell'aria"
    ambient_modifier: "liquido allucinogeno — contaminazione ambientale progressiva"
    onomatopee: []
    composition_zone: null
    notes: "POV entrambi (Dante riceve la rivelazione più devastante). Seed piantato: liquido_allucinogeno_vesper (Adrian ha modificato il sistema antincendio con sostanza allucinogena). Debt piantato: liquido_allucinogeno_esposizione (quanto liquido hanno assorbito? Effetti in arrivo?). NUOVO DETTAGLIO su Marcus: si tagliava — Dante non lo sapeva. Questo è un elemento che potrebbe diventare seed narrativo per il lore di Marcus (ma non apro un debt formale ora — lo segnalo in notes). Adrian: 'La Decomposizione di un Angelo' come titolo della serie fotografica su Marcus — il rapporto Adrian/Marcus come opera d'arte ossessiva."
    provenance: original

  - id: cap_08_s09
    position: 9
    type: fuga_bloccata_condotto
    is_signature: false
    moment: "notte fonda → pre-alba"
    location:
      id: the_vesper
      qualifier: "7° piano — scala antincendio → sala conferenze → condotto ventilazione"
    characters_present:
      - dante_ravencroft
      - rory_winters
      - il_cacciatore
    focal_action: "Fuga evitando il liquido. Scala antincendio: grata d'acciaio saldata al 7° piano. Dante: 'Adrian ha avuto ore per preparare mentre eravamo al safe house. Ha bloccato tutte le uscite principali.' 7° piano: sala conferenze lussuosa. Dante trova la grata di ventilazione nel soffitto — la tira giù (grugnisce di dolore). Sistema di ventilazione verso il parcheggio sotterraneo. Nel condotto: strisciano nel metallo freddo. ~20 metri percorsi. Inseguiti da un uomo di Adrian nel condotto: 'Fermati. O sparo attraverso il condotto.' Dante a Rory: 'A destra. Fidati di me.' Svoltano a destra — proiettili bucano il metallo dove erano un secondo prima. Condotto più vecchio, arrugginito. Cede sotto il loro peso."
    focal_object: null
    atmosphere: "Spazio angusto, metallo freddo, buio totale, respiro affannoso. Il condotto come imbuto verso l'inevitabile. La voce dell'inseguitore come pressione acustica. Dante che conosce il Vesper come il proprio respiro — ma il Vesper è stato modificato da Adrian."
    palette: "condotto metallico buio, ruggine, proiettili che bucano il metallo, polvere"
    ambient_modifier: "ferita di Dante che limita i movimenti — respiro più affannoso ad ogni piano"
    onomatopee: []
    composition_zone: null
    notes: "Action scene. Frase Dante: 'A destra. Fidati di me.' — Rory obbedisce senza esitare: la fiducia come azione. MISALIGNMENT M17 (nuovo): il condotto di ventilazione al 7° piano porta 'direttamente' al Level-2 sotterraneo — fisicamente non coerente una caduta diretta dal 7° piano alla suite sotterranea attraverso un condotto di ventilazione. Segnalare come inconsistenza narrativa tecnica (gravità narrativa: bassa — funzionale al plot ma fisicamente forzato)."
    provenance: original

  - id: cap_08_s10
    position: 10
    type: cliffhanger_level2_sofia
    is_signature: true
    moment: "pre-alba (quasi 5:00 AM)"
    location:
      id: vesper_level_minus2
      qualifier: "suite di recupero — materassi"
    characters_present:
      - dante_ravencroft
      - rory_winters
      - sofia_volkov
      - il_cacciatore
    focal_action: "Cadono dal condotto attraverso il soffitto — pioggia di polvere e metallo. Atterrano su materassi: la suite di recupero del Level-2 dove i Volkov tenevano le persone problematiche. Non soli: Sofia Volkov, lunghi capelli scuri, 'occhi che avevano visto troppo': 'Finalmente. Mi chiedevo quando sareste arrivati.' La porta della suite si apre. Adrian entra con la macchina fotografica. Dietro: due uomini con fucili puntati. Flash. 'Perfetto. Assolutamente perfetto. Tutti i giocatori principali in un'unica scena. Marcus avrebbe adorato la simmetria.' Adrian abbassa la macchina: 'Chi vuole essere il primo a saltare?' Fuori: prime luci dell'alba. Quasi 5:00 AM. 'Il gioco era appena iniziato.'"
    focal_object: macchina_fotografica_adrian
    atmosphere: "Level-2 come palcoscenico allestito da Adrian — i materassi come scelta intenzionale (voleva che ci cadessero?). Sofia Volkov come elemento inaspettato che sa qualcosa che loro non sanno. Adrian come regista di scena teatrale: flash della macchina fotografica come sipario che si apre. L'alba fuori come ironia — nuovo giorno che inizia nell'oscurità del Level-2."
    palette: "suite sotterranea, materassi, Sofia nell'ombra, flash fotocamera, fucili puntati, luci alba filtrate"
    ambient_modifier: "quasi 5:00 AM — alba in arrivo, il gioco 'è appena iniziato'"
    onomatopee: []
    composition_zone: null
    notes: "POV Rory. Cliffhanger finale del capitolo. Seed piantato: sofia_volkov_level2_aspettava ('Mi chiedevo quando sareste arrivati' — Sofia sapeva? È alleata di Dante/Rory o di Adrian? È una pedina?). Debt aperto: sofia_volkov_cosa_sa. Debt aperto: squadra_adrian_identita. Terza lezione del cacciatore (cap_07): 'A volte per vincere devi lasciare che la preda pensi di averti catturato' — Adrian l'ha applicata contro Dante e Rory: li ha lasciati credere di avere una trappola per lui, mentre lui aveva già preparato il suo campo di battaglia. Seed maturing: terza_lezione_cacciatore (la lezione si manifesta ribaltata contro chi l'ha insegnata). OGGETTO NUOVO: macchina_fotografica_adrian appare per la terza volta nel capitolo — strumento centrale dell'identità di Adrian."
    provenance: original
