dominant_attributes:
  tema_dominante: "i fantasmi del passato che abitano il presente — Vesper come teatro dei ricordi di Marcus; l'ammissione di Dante ('sì, come ho fatto io con Marcus') come specchio morale con Adrian; la coppia che sopravvive insieme (Rory torna per Dante invece di fuggire); il secondo bacio come verità non detta; Adrian che capovolge la trappola"
  registro_emotivo: "dark romance/thriller — oppressione atmosferica (locale vuoto, notte), confronto morale devastante (Dante=Adrian), confessione morte Marcus dalla viva voce di Dante, azione tattica sotto fuoco, secondo bacio più profondo del primo, escalation finale al Level-2"
  pov: "alternato (Dante → Rory)"

premise: "Rory e Dante al Vesper vuoto alle tre di notte, 20 ore prima dell'orario dell'invito ad Adrian. Marco ha evacuato il personale. Ricognizione strategica del campo di battaglia prima dello scontro."

problem: "Adrian arriva in anticipo di venti ore, con una squadra di ex-militari. Il piano viene capovolto: da cacciatori diventano prede. Dante viene ferito. Il liquido allucinogeno contamina il sistema antincendio. Le vie di fuga sono bloccate. Finiscono al Level-2 dove Sofia Volkov li aspettava."

threshold_moment: "Il secondo bacio nel magazzino del 10° piano: 'Non il bacio disperato del safe house. Questo era diverso. Più profondo. Come se stesse versando ogni verità non detta in quel contatto.' + Rory che torna indietro per Dante invece di fuggire: 'Pensi davvero che ti avrei lasciato lì?' → 'No fucking way.'"

resolution_mode: "Nessuna risoluzione — cliffhanger. Tutti i giocatori principali intrappolati al Level-2 con Adrian e la sua squadra armata. Sofia Volkov dice 'Mi chiedevo quando sareste arrivati.' Adrian: 'Chi vuole essere il primo a saltare?'"

