# ── DRIFT RILEVATI (decisione autoriale richiesta) ─────────────
# Da consolidare nel grafo (rientro Fase 03) se canonici, altrimenti revisione.
drift:
  - id: "drift_giovanni_adelaide_legame"
    descrizione: >
      Aggiunto rapporto pregresso affettivo Giovanni–Adelaide (tè all'attico,
      racconti d'infanzia di lei; mezza-frase "lo lascio a chi lo merita e a
      chi lo capisce"). Non previsto esplicitamente nel brief. Dà a Giovanni
      movente personale e giustifica la sua conoscenza intima dell'attico
      (necessaria all'hook). NON è una frase-codice.
    scene_coinvolte: ["cap_01_s03", "cap_01_s04"]
    proposta: "promuovere a canone (relazione giovanni_liguori ↔ adelaide_aldovrandi)"

