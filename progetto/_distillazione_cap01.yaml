# === CORE NARRATIVO ===

premise: >
  Rory Winters entra al Vesper sotto identità parzialmente falsa (usa il nome di Natasha Volkov)
  per investigare tre ragazze scomparse che avevano in comune l'ultima apparizione nel club.
  Dante Ravencroft la identifica immediatamente e sceglie di non buttarla fuori.

problem: >
  Chi manipola chi? Rory vuole informazioni sulle ragazze scomparse e usa il Vesper come punto
  di accesso. Dante sa chi è Rory dal momento in cui entra (Alexei lo informa) e decide di
  usarla — non di eliminarla. Il controllo del territorio vs. il bisogno di verità.

threshold_moment: >
  Dante le offre il braccio nel corridoio dopo che lei ha rivelato le tre ragazze scomparse.
  Rory prende il braccio: l'intrusa diventa ospite (consentita). La caccia diventa gioco condiviso.

resolution_mode: >
  Accordo sospeso: Dante propone che Rory lavori come PR del Vesper ottenendo in cambio
  accesso dall'interno. 24 ore per decidere. Biglietto da visita nero, solo un numero.
  Rory viene scortata fuori da Marco senza che la decisione sia presa.

