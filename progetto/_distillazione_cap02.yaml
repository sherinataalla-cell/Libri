# === CORE NARRATIVO ===

premise: >
  A 18 ore dalla proposta, Rory è ancora senza risposta ma la scoperta che Sofia Volkov è
  cugina di Natasha la spinge a chiamare Dante e accettare. Dante l'aspettava: ha già studiato
  il suo dossier, le ha mandato un vestito come primo test. Nell'ufficio si negoziano le regole —
  lei chiede le sue garanzie, lui le sue. La danza ricomincia in modo diverso: non più
  infiltrazione ma contratto.

problem: >
  Chi sta usando chi? Rory accetta il lavoro credendo di avere il controllo — accesso dall'interno,
  possibilità di trovare la verità sulle ragazze. Dante sa che lei è l'esca perfetta per stanare
  chi caccia nel suo territorio. Il vestito come primo test di obbedienza. Le regole come
  negoziazione di territorio. Entrambi fingono di avere il controllo che non hanno.

threshold_moment: >
  La scena della finestra: Dante dietro di lei a 42 metri di vuoto, il suo respiro sul collo,
  "Ancora indecisa." Non è una domanda. Il corpo di Rory tradisce il pericolo ma lei non si
  muove. È il momento in cui la maschera da giornalista cede alla maschera da PR — e lei lo sa.

resolution_mode: >
  Rory accetta formalmente il lavoro (stipendio, contratto un anno, bonus per "sopravvivere").
  Dante la manda con Marco al suo ufficio con "accesso al level 2". Dopo, rivela ad un
  interlocutore sconosciuto il piano vero: Rory come esca. Scende al level -2 dove un
  prigioniero senza nome profetizza "questa volta brucerà tutto."

